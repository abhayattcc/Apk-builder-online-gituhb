name: 🚀 Build Signed APK / AAB from HTML (with WebSpeech API via Java Bridge)

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: '📱 App Name (e.g. My Dictionary App)'
        required: true
        default: 'Image Dictionary by abhayattcc'
      package_name:
        description: '📦 Package Name (e.g. com.yourname.appname)'
        required: true
        default: 'com.abhayattcc.dictionary'
      version_name:
        description: '🔢 Version Name (e.g. 1.0.0)'
        required: true
        default: '1.0.0'
      version_code:
        description: '🔢 Version Code (integer, e.g. 1)'
        required: true
        default: '1'
      build_type:
        description: '📦 Build Output Type'
        required: true
        default: 'BOTH'
        type: choice
        options:
          - APK
          - AAB
          - BOTH
      min_sdk:
        description: '📱 Minimum Android SDK (21=Android 5.0, 24=7.0, 26=8.0)'
        required: true
        default: '21'
        type: choice
        options:
          - '21'
          - '24'
          - '26'
          - '28'
      orientation:
        description: '📐 Screen Orientation'
        required: true
        default: 'unspecified'
        type: choice
        options:
          - unspecified
          - portrait
          - landscape
      theme_color:
        description: '🎨 App Theme Color (hex, e.g. #ff6f61)'
        required: true
        default: '#ff6f61'
      keystore_password:
        description: '🔑 Keystore Password (min 6 chars)'
        required: true
      key_alias:
        description: '🔑 Key Alias (e.g. mykey)'
        required: true
        default: 'mykey'
      key_password:
        description: '🔑 Key Password (min 6 chars)'
        required: true
      keystore_validity_years:
        description: '📅 Keystore Validity (years)'
        required: true
        default: '25'
      cert_cn:
        description: '👤 Certificate CN (Your Name or Org)'
        required: true
        default: 'abhayattcc'

  push:
    paths:
      - 'index.html'
      - 'index.zip'

jobs:
  build:
    name: 🔨 Build Android App (WebSpeech API fixed via Java Bridge)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ─── 1. Checkout ────────────────────────────────────────────────────────
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # ─── 2. Detect input file ───────────────────────────────────────────────
      - name: 🔍 Detect HTML / ZIP input
        id: detect
        run: |
          if [ -f "index.zip" ]; then
            echo "INPUT_TYPE=zip" >> $GITHUB_OUTPUT
            echo "✅ Found index.zip"
          elif [ -f "index.html" ]; then
            echo "INPUT_TYPE=html" >> $GITHUB_OUTPUT
            echo "✅ Found index.html"
          else
            echo "❌ No index.html or index.zip found in repository root!"
            exit 1
          fi

      # ─── 3. Set build variables ─────────────────────────────────────────────
      - name: ⚙️ Set Build Variables
        id: vars
        run: |
          APP_NAME="${{ github.event.inputs.app_name || 'Image Dictionary by abhayattcc' }}"
          PKG_NAME="${{ github.event.inputs.package_name || 'com.abhayattcc.dictionary' }}"
          VERSION_NAME="${{ github.event.inputs.version_name || '1.0.0' }}"
          VERSION_CODE="${{ github.event.inputs.version_code || '1' }}"
          BUILD_TYPE="${{ github.event.inputs.build_type || 'BOTH' }}"
          MIN_SDK="${{ github.event.inputs.min_sdk || '21' }}"
          ORIENTATION="${{ github.event.inputs.orientation || 'unspecified' }}"
          THEME_COLOR="${{ github.event.inputs.theme_color || '#ff6f61' }}"
          KS_PASSWORD="${{ github.event.inputs.keystore_password || secrets.KEYSTORE_PASSWORD }}"
          KEY_ALIAS="${{ github.event.inputs.key_alias || 'mykey' }}"
          KEY_PASSWORD="${{ github.event.inputs.key_password || secrets.KEY_PASSWORD }}"
          VALIDITY="${{ github.event.inputs.keystore_validity_years || '25' }}"
          CERT_CN="${{ github.event.inputs.cert_cn || 'abhayattcc' }}"

          PKG_PATH=$(echo "$PKG_NAME" | tr '.' '/')

          echo "APP_NAME=$APP_NAME"               >> $GITHUB_OUTPUT
          echo "PKG_NAME=$PKG_NAME"               >> $GITHUB_OUTPUT
          echo "PKG_PATH=$PKG_PATH"               >> $GITHUB_OUTPUT
          echo "VERSION_NAME=$VERSION_NAME"       >> $GITHUB_OUTPUT
          echo "VERSION_CODE=$VERSION_CODE"       >> $GITHUB_OUTPUT
          echo "BUILD_TYPE=$BUILD_TYPE"           >> $GITHUB_OUTPUT
          echo "MIN_SDK=$MIN_SDK"                 >> $GITHUB_OUTPUT
          echo "ORIENTATION=$ORIENTATION"         >> $GITHUB_OUTPUT
          echo "THEME_COLOR=$THEME_COLOR"         >> $GITHUB_OUTPUT
          echo "KS_PASSWORD=$KS_PASSWORD"         >> $GITHUB_OUTPUT
          echo "KEY_ALIAS=$KEY_ALIAS"             >> $GITHUB_OUTPUT
          echo "KEY_PASSWORD=$KEY_PASSWORD"       >> $GITHUB_OUTPUT
          echo "VALIDITY=$VALIDITY"               >> $GITHUB_OUTPUT
          echo "CERT_CN=$CERT_CN"                 >> $GITHUB_OUTPUT

          echo ""
          echo "📋 Build Configuration:"
          echo "   App Name    : $APP_NAME"
          echo "   Package     : $PKG_NAME"
          echo "   Version     : $VERSION_NAME ($VERSION_CODE)"
          echo "   Build Type  : $BUILD_TYPE"
          echo "   Min SDK     : $MIN_SDK"

      # ─── 4. Java & Android SDK ──────────────────────────────────────────────
      - name: ☕ Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📱 Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: 🛠️ Install Android Build Tools
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      # ─── 5. Prepare web assets ──────────────────────────────────────────────
      - name: 📂 Prepare Web Assets
        run: |
          mkdir -p web_assets

          if [ "${{ steps.detect.outputs.INPUT_TYPE }}" = "zip" ]; then
            echo "📦 Extracting index.zip..."
            unzip -o index.zip -d web_assets/
            SUBDIR=$(find web_assets -maxdepth 1 -mindepth 1 -type d | head -1)
            if [ -n "$SUBDIR" ] && [ ! -f "web_assets/index.html" ]; then
              mv "$SUBDIR"/* web_assets/ 2>/dev/null || true
              rmdir "$SUBDIR" 2>/dev/null || true
            fi
          else
            echo "📄 Copying index.html..."
            cp index.html web_assets/
            for ext in css js png jpg jpeg gif svg ico json woff woff2 ttf; do
              find . -maxdepth 1 -name "*.$ext" -exec cp {} web_assets/ \; 2>/dev/null || true
            done
            for dir in css js images assets fonts; do
              [ -d "$dir" ] && cp -r "$dir" web_assets/ || true
            done
          fi

          echo "✅ Web assets prepared:"
          ls -la web_assets/

      # ─── 6. Prepare App Icon (use icon.png from GitHub repo if uploaded) ─
      - name: 🎨 Prepare App Icon (use icon.png from GitHub if present, else fallback)
        run: |
          sudo apt-get install -y imagemagick -q

          if [ -f "icon.png" ]; then
            echo "✅ Found uploaded icon.png (512×512) – resizing to all mipmap densities"
            convert icon.png -resize 48x48   icon_48.png
            convert icon.png -resize 72x72   icon_72.png
            convert icon.png -resize 96x96   icon_96.png
            convert icon.png -resize 144x144 icon_144.png
            convert icon.png -resize 192x192 icon_192.png
          else
            echo "⚠️ No icon.png found – generating default icon from theme color"
            THEME_COLOR="${{ steps.vars.outputs.THEME_COLOR }}"
            APP_INITIAL=\( (echo " \){{ steps.vars.outputs.APP_NAME }}" | cut -c1 | tr '[:lower:]' '[:upper:]')

            for SIZE in 48 72 96 144 192; do
              convert -size \( {SIZE}x \){SIZE} \
                "xc:${THEME_COLOR}" \
                -font DejaVu-Sans-Bold \
                -pointsize $((SIZE * 55 / 100)) \
                -fill white \
                -gravity Center \
                -annotate 0 "$APP_INITIAL" \
                "icon_${SIZE}.png" 2>/dev/null || \
              convert -size \( {SIZE}x \){SIZE} \
                "xc:${THEME_COLOR}" \
                "icon_${SIZE}.png"
            done
          fi

          [ ! -f "web_assets/icon-192.png" ] && cp icon_192.png web_assets/icon-192.png || true

          echo "✅ App icons prepared (icon.png from GitHub used when available)"

      # ─── 7. Create Android project structure ────────────────────────────────
      - name: 🏗️ Create Android Project Structure
        run: |
          PKG_NAME="${{ steps.vars.outputs.PKG_NAME }}"
          PKG_PATH="${{ steps.vars.outputs.PKG_PATH }}"
          APP_NAME="${{ steps.vars.outputs.APP_NAME }}"
          VERSION_NAME="${{ steps.vars.outputs.VERSION_NAME }}"
          VERSION_CODE="${{ steps.vars.outputs.VERSION_CODE }}"
          MIN_SDK="${{ steps.vars.outputs.MIN_SDK }}"
          ORIENTATION="${{ steps.vars.outputs.ORIENTATION }}"
          THEME_COLOR="${{ steps.vars.outputs.THEME_COLOR }}"

          ANDROID_COLOR=$(echo "$THEME_COLOR" | sed 's/#//')

          mkdir -p android_project/app/src/main/java/$PKG_PATH
          mkdir -p android_project/app/src/main/res/{layout,values,drawable,mipmap-mdpi,mipmap-hdpi,mipmap-xhdpi,mipmap-xxhdpi,mipmap-xxxhdpi}
          mkdir -p android_project/app/src/main/assets/www

          cp -r web_assets/* android_project/app/src/main/assets/www/

          cp icon_48.png  android_project/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp icon_72.png  android_project/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp icon_96.png  android_project/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp icon_144.png android_project/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp icon_192.png android_project/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

          echo "✅ Android project structure created"

      # ─── 8. Write Android source files (UPDATED with Java Bridge for WebSpeech API) ─
      - name: 📝 Write Android Source Files (WebSpeech API polyfill via Java TTS bridge)
        run: |
          PKG_NAME="${{ steps.vars.outputs.PKG_NAME }}"
          PKG_PATH="${{ steps.vars.outputs.PKG_PATH }}"
          APP_NAME="${{ steps.vars.outputs.APP_NAME }}"
          VERSION_NAME="${{ steps.vars.outputs.VERSION_NAME }}"
          VERSION_CODE="${{ steps.vars.outputs.VERSION_CODE }}"
          MIN_SDK="${{ steps.vars.outputs.MIN_SDK }}"
          ORIENTATION="${{ steps.vars.outputs.ORIENTATION }}"
          ANDROID_COLOR=\( (echo " \){{ steps.vars.outputs.THEME_COLOR }}" | sed 's/#//')

          # ── settings.gradle ────────────────────────────────────────────────
          cat > android_project/settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "WebApp"
          include ':app'
          EOF

          # ── root build.gradle ───────────────────────────────────────────────
          cat > android_project/build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.2.2' apply false
          }
          EOF

          # ── gradle wrapper properties ───────────────────────────────────────
          mkdir -p android_project/gradle/wrapper
          cat > android_project/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.6-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          # ── gradle.properties ───────────────────────────────────────────────
          cat > android_project/gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

          # ── app/build.gradle ────────────────────────────────────────────────
          cat > android_project/app/build.gradle << EOF
          plugins {
              id 'com.android.application'
          }

          android {
              namespace '$PKG_NAME'
              compileSdk 34

              defaultConfig {
                  applicationId "$PKG_NAME"
                  minSdk $MIN_SDK
                  targetSdk 34
                  versionCode $VERSION_CODE
                  versionName "$VERSION_NAME"
              }

              signingConfigs {
                  release {
                      storeFile file("../keystore.jks")
                      storePassword System.getenv("KS_PASSWORD")
                      keyAlias System.getenv("KEY_ALIAS")
                      keyPassword System.getenv("KEY_PASSWORD")
                  }
              }

              buildTypes {
                  release {
                      minifyEnabled false
                      signingConfig signingConfigs.release
                  }
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }

          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.webkit:webkit:1.10.0'
          }
          EOF

          # ── gradlew ─────────────────────────────────────────────────────────
          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.6.0/gradlew" -o android_project/gradlew 2>/dev/null || cat > android_project/gradlew << 'GRADLEW'
          #!/bin/sh
          exec gradle "$@"
          GRADLEW
          chmod +x android_project/gradlew

          # ── AndroidManifest.xml ─────────────────────────────────────────────
          cat > android_project/app/src/main/AndroidManifest.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="$PKG_NAME">

              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="29" />
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />
              <uses-permission android:name="android.permission.READ_MEDIA_AUDIO" />
              <uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />

              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:theme="@style/AppTheme"
                  android:usesCleartextTraffic="true"
                  android:hardwareAccelerated="true">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:screenOrientation="$ORIENTATION"
                      android:configChanges="orientation|screenSize|keyboardHidden"
                      android:windowSoftInputMode="adjustResize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>

              </application>
          </manifest>
          EOF

          # ── MainActivity.java (UPDATED - FULL WebSpeech API support via Java TTS bridge + polyfill injection) ─
          cat > android_project/app/src/main/java/$PKG_PATH/MainActivity.java << 'EOF'
          package ${PKG_NAME};

          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebChromeClient;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.webkit.PermissionRequest;
          import android.webkit.ValueCallback;
          import android.webkit.WebChromeClient.FileChooserParams;
          import android.content.Intent;
          import android.net.Uri;
          import android.view.View;
          import android.view.Window;
          import android.view.WindowManager;
          import android.widget.ProgressBar;
          import android.widget.RelativeLayout;
          import android.speech.tts.TextToSpeech;
          import android.speech.tts.UtteranceProgressListener;
          import android.os.Build;
          import java.util.Locale;

          public class MainActivity extends Activity {

              private WebView webView;
              private TextToSpeech tts;
              private ValueCallback<Uri[]> filePathCallback;
              private static final int FILE_CHOOSER_REQUEST = 100;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  requestWindowFeature(Window.FEATURE_NO_TITLE);
                  getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN, WindowManager.LayoutParams.FLAG_FULLSCREEN);

                  RelativeLayout layout = new RelativeLayout(this);
                  layout.setLayoutParams(new RelativeLayout.LayoutParams(RelativeLayout.LayoutParams.MATCH_PARENT, RelativeLayout.LayoutParams.MATCH_PARENT));

                  webView = new WebView(this);
                  RelativeLayout.LayoutParams wvParams = new RelativeLayout.LayoutParams(RelativeLayout.LayoutParams.MATCH_PARENT, RelativeLayout.LayoutParams.MATCH_PARENT);
                  webView.setLayoutParams(wvParams);

                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setDatabaseEnabled(true);
                  settings.setAllowFileAccess(true);
                  settings.setAllowContentAccess(true);
                  settings.setAllowFileAccessFromFileURLs(true);
                  settings.setAllowUniversalAccessFromFileURLs(true);
                  settings.setMediaPlaybackRequiresUserGesture(false);
                  settings.setSupportZoom(true);
                  settings.setBuiltInZoomControls(true);
                  settings.setDisplayZoomControls(false);
                  settings.setLoadWithOverviewMode(true);
                  settings.setUseWideViewPort(true);
                  settings.setCacheMode(WebSettings.LOAD_DEFAULT);

                  // TTS initialization (for Odia, Hindi, English)
                  tts = new TextToSpeech(this, new TextToSpeech.OnInitListener() {
                      @Override
                      public void onInit(int status) {
                          if (status == TextToSpeech.SUCCESS) {
                              tts.setOnUtteranceProgressListener(new UtteranceProgressListener() {
                                  @Override
                                  public void onStart(String utteranceId) {}
                                  @Override
                                  public void onDone(String utteranceId) {
                                      if (webView != null) {
                                          webView.post(() -> webView.evaluateJavascript("window.ttsOnEnd && window.ttsOnEnd('" + utteranceId + "');", null));
                                      }
                                  }
                                  @Override
                                  public void onError(String utteranceId) {
                                      if (webView != null) {
                                          webView.post(() -> webView.evaluateJavascript("window.ttsOnEnd && window.ttsOnEnd('" + utteranceId + "');", null));
                                      }
                                  }
                              });
                          }
                      }
                  });

                  // Java bridge for Web Speech API (exposed as AndroidTTS)
                  webView.addJavascriptInterface(new WebAppInterface(MainActivity.this, tts), "AndroidTTS");

                  ProgressBar progressBar = new ProgressBar(this, null, android.R.attr.progressBarStyleHorizontal);
                  RelativeLayout.LayoutParams pbParams = new RelativeLayout.LayoutParams(RelativeLayout.LayoutParams.MATCH_PARENT, 8);
                  pbParams.addRule(RelativeLayout.ALIGN_PARENT_TOP);
                  progressBar.setLayoutParams(pbParams);
                  progressBar.setMax(100);

                  webView.setWebChromeClient(new WebChromeClient() {
                      @Override
                      public void onProgressChanged(WebView view, int progress) {
                          progressBar.setProgress(progress);
                          progressBar.setVisibility(progress < 100 ? View.VISIBLE : View.GONE);
                      }
                      @Override
                      public void onPermissionRequest(PermissionRequest request) {
                          request.grant(request.getResources());
                      }
                      @Override
                      public boolean onShowFileChooser(WebView webView, ValueCallback<Uri[]> filePathCallback, FileChooserParams fileChooserParams) {
                          MainActivity.this.filePathCallback = filePathCallback;
                          Intent intent = fileChooserParams.createIntent();
                          try {
                              startActivityForResult(intent, FILE_CHOOSER_REQUEST);
                          } catch (Exception e) {
                              return false;
                          }
                          return true;
                      }
                  });

                  webView.setWebViewClient(new WebViewClient() {
                      @Override
                      public boolean shouldOverrideUrlLoading(WebView view, String url) {
                          if (url.startsWith("file://") || url.startsWith("about:")) {
                              return false;
                          }
                          Intent intent = new Intent(Intent.ACTION_VIEW, Uri.parse(url));
                          startActivity(intent);
                          return true;
                      }

                      @Override
                      public void onPageFinished(WebView view, String url) {
                          super.onPageFinished(view, url);
                          // Inject Web Speech API polyfill (no change to index.html needed)
                          String polyfillJS = "(function(){" +
                              "if(window.speechSynthesis&&window.speechSynthesis._polyfilled)return;" +
                              "let c=0;" +
                              "const s={" +
                              "_polyfilled:true," +
                              "speak:function(u){" +
                              "if(!u||!u.text)return;" +
                              "const id='utt_'+(c++);" +
                              "u._id=id;" +
                              "if(typeof u.onend==='function')window['onend_'+id]=u.onend;" +
                              "const lang=u.lang||'en',rate=u.rate||1,pitch=u.pitch||1,volume=u.volume||1,text=u.text;" +
                              "AndroidTTS.speak(text,lang,rate,pitch,volume,id);" +
                              "}," +
                              "cancel:function(){AndroidTTS.cancel();}," +
                              "pause:function(){AndroidTTS.pause();}," +
                              "resume:function(){}," +
                              "getVoices:function(){" +
                              "return[{name:'English (US)',lang:'en-US',default:true},{name:'Hindi (India)',lang:'hi-IN'},{name:'Odia (India)',lang:'or-IN'}];" +
                              "}" +
                              "};" +
                              "window.speechSynthesis=s;" +
                              "window.ttsOnEnd=function(id){" +
                              "if(window['onend_'+id]){try{window['onend_'+id]({type:'end'});}catch(e){}delete window['onend_'+id];}" +
                              "};" +
                              "})();";
                          view.evaluateJavascript(polyfillJS, null);
                      }
                  });

                  layout.addView(webView);
                  layout.addView(progressBar);
                  setContentView(layout);

                  webView.loadUrl("file:///android_asset/www/index.html");
              }

              private static class WebAppInterface {
                  private final Activity mContext;
                  private final TextToSpeech tts;

                  WebAppInterface(Activity c, TextToSpeech t) {
                      mContext = c;
                      tts = t;
                  }

                  @android.webkit.JavascriptInterface
                  public void speak(String text, String lang, double rate, double pitch, double volume, String utteranceId) {
                      if (tts == null || text == null || text.isEmpty()) return;

                      Locale locale = Locale.US;
                      if (lang != null && lang.length() >= 2) {
                          String lc = lang.substring(0, 2).toLowerCase();
                          if ("or".equals(lc)) locale = new Locale("or", "IN");
                          else if ("hi".equals(lc)) locale = new Locale("hi", "IN");
                          else if ("en".equals(lc)) locale = Locale.US;
                      }

                      int res = tts.setLanguage(locale);
                      if (res == TextToSpeech.LANG_MISSING_DATA || res == TextToSpeech.LANG_NOT_SUPPORTED) {
                          tts.setLanguage(Locale.US);
                      }

                      tts.setSpeechRate((float) rate);
                      tts.setPitch((float) pitch);

                      android.os.Bundle params = new android.os.Bundle();
                      params.putString(TextToSpeech.Engine.KEY_PARAM_UTTERANCE_ID, utteranceId);
                      tts.speak(text, TextToSpeech.QUEUE_FLUSH, params, utteranceId);
                  }

                  @android.webkit.JavascriptInterface
                  public void cancel() {
                      if (tts != null) tts.stop();
                  }

                  @android.webkit.JavascriptInterface
                  public void pause() {
                      if (tts != null) tts.stop();
                  }
              }

              @Override
              public void onActivityResult(int requestCode, int resultCode, Intent data) {
                  if (requestCode == FILE_CHOOSER_REQUEST) {
                      if (filePathCallback != null) {
                          Uri[] results = null;
                          if (resultCode == RESULT_OK && data != null) {
                              results = new Uri[]{data.getData()};
                          }
                          filePathCallback.onReceiveValue(results);
                          filePathCallback = null;
                      }
                  }
              }

              @Override
              public void onBackPressed() {
                  if (webView.canGoBack()) {
                      webView.goBack();
                  } else {
                      super.onBackPressed();
                  }
              }

              @Override
              protected void onDestroy() {
                  if (tts != null) {
                      tts.shutdown();
                  }
                  super.onDestroy();
              }
          }
          EOF

          echo "✅ MainActivity.java written with full WebSpeech API support (Java TTS bridge + polyfill injection)"

          # ── strings.xml, colors.xml, themes.xml (unchanged) ─
          cat > android_project/app/src/main/res/values/strings.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">$APP_NAME</string>
          </resources>
          EOF

          cat > android_project/app/src/main/res/values/colors.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#${ANDROID_COLOR}</color>
              <color name="colorPrimaryDark">#${ANDROID_COLOR}</color>
              <color name="colorAccent">#${ANDROID_COLOR}</color>
          </resources>
          EOF

          cat > android_project/app/src/main/res/values/themes.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="colorPrimary">@color/colorPrimary</item>
                  <item name="colorPrimaryDark">@color/colorPrimaryDark</item>
                  <item name="colorAccent">@color/colorAccent</item>
                  <item name="android:windowBackground">@android:color/white</item>
              </style>
          </resources>
          EOF

          echo "✅ All Android source files written"

      # ─── 9. Generate Keystore ───────────────────────────────────────────────
      - name: 🔑 Generate Keystore
        run: |
          KS_PASSWORD="${{ steps.vars.outputs.KS_PASSWORD }}"
          KEY_ALIAS="${{ steps.vars.outputs.KEY_ALIAS }}"
          KEY_PASSWORD="${{ steps.vars.outputs.KEY_PASSWORD }}"
          VALIDITY="${{ steps.vars.outputs.VALIDITY }}"
          CERT_CN="${{ steps.vars.outputs.CERT_CN }}"
          VALIDITY_DAYS=$((VALIDITY * 365))

          keytool -genkeypair \
            -v \
            -keystore android_project/keystore.jks \
            -storetype JKS \
            -alias "$KEY_ALIAS" \
            -keyalg RSA \
            -keysize 2048 \
            -validity $VALIDITY_DAYS \
            -storepass "$KS_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            -dname "CN=$CERT_CN, OU=Android, O=WebApp, L=City, ST=State, C=IN"

          echo "✅ Keystore generated (valid for $VALIDITY years)"

      # ─── 10. Install Gradle ─────────────────────────────────────────────────
      - name: ⚙️ Install Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      # ─── 11. Build APK ──────────────────────────────────────────────────────
      - name: 🔨 Build Release APK
        if: ${{ steps.vars.outputs.BUILD_TYPE == 'APK' || steps.vars.outputs.BUILD_TYPE == 'BOTH' }}
        working-directory: android_project
        env:
          KS_PASSWORD: ${{ steps.vars.outputs.KS_PASSWORD }}
          KEY_ALIAS: ${{ steps.vars.outputs.KEY_ALIAS }}
          KEY_PASSWORD: ${{ steps.vars.outputs.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease --no-daemon --stacktrace
          echo "✅ APK build complete"

      # ─── 12. Build AAB ──────────────────────────────────────────────────────
      - name: 🔨 Build Release AAB
        if: ${{ steps.vars.outputs.BUILD_TYPE == 'AAB' || steps.vars.outputs.BUILD_TYPE == 'BOTH' }}
        working-directory: android_project
        env:
          KS_PASSWORD: ${{ steps.vars.outputs.KS_PASSWORD }}
          KEY_ALIAS: ${{ steps.vars.outputs.KEY_ALIAS }}
          KEY_PASSWORD: ${{ steps.vars.outputs.KEY_PASSWORD }}
        run: |
          ./gradlew bundleRelease --no-daemon --stacktrace
          echo "✅ AAB build complete"

      # ─── 13. Collect outputs ────────────────────────────────────────────────
      - name: 📋 Collect Build Outputs
        run: |
          mkdir -p build_output
          APP_NAME="${{ steps.vars.outputs.APP_NAME }}"
          VERSION="${{ steps.vars.outputs.VERSION_NAME }}"
          SAFE_NAME=$(echo "$APP_NAME" | tr ' ' '_' | tr -cd '[:alnum:]_-')

          find android_project -name "*.apk" -exec cp {} "build_output/\( {SAFE_NAME}_v \){VERSION}.apk" \; 2>/dev/null || true
          find android_project -name "*.aab" -exec cp {} "build_output/\( {SAFE_NAME}_v \){VERSION}.aab" \; 2>/dev/null || true

          echo "📦 Build outputs:"
          ls -lh build_output/

      # ─── 14. Upload artifacts (APK + AAB + keystore) ───────────────────────
      - name: 📤 Upload APK Artifact
        if: ${{ steps.vars.outputs.BUILD_TYPE == 'APK' || steps.vars.outputs.BUILD_TYPE == 'BOTH' }}
        uses: actions/upload-artifact@v4
        with:
          name: signed-apk
          path: build_output/*.apk
          retention-days: 30

      - name: 📤 Upload AAB Artifact
        if: ${{ steps.vars.outputs.BUILD_TYPE == 'AAB' || steps.vars.outputs.BUILD_TYPE == 'BOTH' }}
        uses: actions/upload-artifact@v4
        with:
          name: signed-aab
          path: build_output/*.aab
          retention-days: 30

      - name: 📤 Upload Keystore Artifact
        uses: actions/upload-artifact@v4
        with:
          name: signing-keystore
          path: android_project/keystore.jks
          retention-days: 30

      # ─── 15. Build Summary ──────────────────────────────────────────────────
      - name: 📊 Build Summary
        run: |
          echo "## ✅ Build Successful! 🎉" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 📱 App Name | ${{ steps.vars.outputs.APP_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Package | ${{ steps.vars.outputs.PKG_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔢 Version | \( {{ steps.vars.outputs.VERSION_NAME }} ( \){{ steps.vars.outputs.VERSION_CODE }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| 📱 Min SDK | Android API ${{ steps.vars.outputs.MIN_SDK }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Output | ${{ steps.vars.outputs.BUILD_TYPE }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⬇️ **Download artifacts** from the **Artifacts** section above:" >> $GITHUB_STEP_SUMMARY
          echo "- Signed APK / AAB" >> $GITHUB_STEP_SUMMARY
          echo "- keystore.jks (for future builds or Play Store upload)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ WebSpeech API (English/Hindi/Odia) now fully works via Java TTS bridge + polyfill injection. No changes made to your original index.html!" >> $GITHUB_STEP_SUMMARY
