name: Sign APK/AAB

on:
  workflow_dispatch:  # Manual trigger
  push:
    paths:
      - 'sample.*'    # Trigger when sample.apk or sample.aab is uploaded

jobs:
  sign:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Verify uploaded file
      id: verify-file
      run: |
        if [[ -f "sample.apk" ]]; then
          echo "file_type=apk" >> $GITHUB_OUTPUT
          echo "input_file=sample.apk" >> $GITHUB_OUTPUT
          echo "output_file=signed-sample.apk" >> $GITHUB_OUTPUT
        elif [[ -f "sample.aab" ]]; then
          echo "file_type=aab" >> $GITHUB_OUTPUT
          echo "input_file=sample.aab" >> $GITHUB_OUTPUT
          echo "output_file=signed-sample.aab" >> $GITHUB_OUTPUT
        else
          echo "No sample.apk or sample.aab found!"
          exit 1
        fi

    - name: Create keystore directory
      run: mkdir -p ~/.android

    - name: Import keystore
      if: github.event_name == 'workflow_dispatch'
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        echo "$KEYSTORE_BASE64" | base64 -di > ~/.android/debug.keystore
        echo "y" | keytool -importkeystore \
          -srckeystore ~/.android/debug.keystore \
          -destkeystore ~/.android/release-keystore.jks \
          -srcstorepass "$KEYSTORE_PASSWORD" \
          -deststorepass "$KEYSTORE_PASSWORD" \
          -srcalias androiddebugkey \
          -destalias "$KEY_ALIAS" \
          -keypass "$KEY_PASSWORD" \
          -srckeypass android

    - name: Use pre-uploaded keystore (if exists)
      if: github.event_name == 'push'
      run: |
        if [[ -f "keystore.jks" ]]; then
          cp keystore.jks ~/.android/release-keystore.jks
          echo "Using pre-uploaded keystore"
        else
          echo "No keystore.jks found. Upload one first."
          exit 1
        fi

    - name: Sign APK
      if: steps.verify-file.outputs.file_type == 'apk'
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        apksigner sign \
          --ks ~/.android/release-keystore.jks \
          --ks-key-alias "$KEY_ALIAS" \
          --ks-pass pass:"$KEY_PASSWORD" \
          --key-pass pass:"$KEY_PASSWORD" \
          --storepass "$KEYSTORE_PASSWORD" \
          --v1-signing-enabled \
          --v2-signing-enabled \
          --out "${{ steps.verify-file.outputs.output_file }}" \
          "${{ steps.verify-file.outputs.input_file }}"

    - name: Sign AAB
      if: steps.verify-file.outputs.file_type == 'aab'
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        # Build signed AAB using bundletool
        bundletool build-apks \
          --bundle="${{ steps.verify-file.outputs.input_file }}" \
          --output=signed.apks \
          --ks=~/.android/release-keystore.jks \
          --ks-pass=pass:"$KEYSTORE_PASSWORD" \
          --ks-key-alias="$KEY_ALIAS" \
          --key-pass=pass:"$KEY_PASSWORD"
        
        # Extract universal APK from AAB
        unzip -p signed.apks universal.apk > "${{ steps.verify-file.outputs.output_file }}"

    - name: Verify signature
      run: |
        apksigner verify --verbose "${{ steps.verify-file.outputs.output_file }}"

    - name: Upload signed artifact
      uses: actions/upload-artifact@v4
      with:
        name: signed-${{ steps.verify-file.outputs.file_type }}
        path: ${{ steps.verify-file.outputs.output_file }}
        retention-days: 30

    - name: Create release (optional)
      if: github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: signed-${{ github.run_number }}
        name: Signed ${{ steps.verify-file.outputs.file_type.toUpperCase() }} #${{ github.run_number }}
        files: ${{ steps.verify-file.outputs.output_file }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}