name: Convert Odia PDF to Unicode

on:
  push:
    branches:
      - main
    paths:
      - "**/*.pdf"       # Triggers automatically when a PDF is pushed
  workflow_dispatch:     # ADDED: Allows you to manually click "Run workflow" in GitHub

permissions:
  contents: write      # Needed to commit the output .txt back to the repo

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pdfminer.six

      - name: Convert all PDFs to Odia Unicode text
        run: |
          set -e
          
          # Check if any PDFs exist before trying to loop
          pdf_count=$(find . -type f -name "*.pdf" | wc -l)
          if [ "$pdf_count" -eq 0 ]; then
            echo "No PDF files found in the repository to convert."
            exit 0
          fi

          # Safely find and convert PDFs (handles spaces in filenames)
          find . -type f -name "*.pdf" -print0 | while IFS= read -r -d '' pdf; do
            base="${pdf%.pdf}"
            out="${base}_unicode.txt"
            echo "Converting: $pdf  ->  $out"
            python3 odia_convert.py "$pdf" -o "$out"
          done

      - name: Commit output txt files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Safely find and stage all generated text files
          find . -type f -name "*_unicode.txt" -exec git add {} +
          
          # Only commit and push if there are actual changes
          if ! git diff --cached --quiet; then
            git commit -m "Auto-convert PDF to Odia Unicode [skip ci]"
            git push
          else
            echo "No new text conversions to commit."
          fi
