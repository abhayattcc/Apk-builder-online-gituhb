name: Build Signed APK/AAB from gk.html

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App Name (displayed on launcher)'
        required: true
        default: 'Lucent GK 2026'
        type: string
      package_name:
        description: 'Package Name (e.g. com.yourname.lucentgk)'
        required: true
        default: 'com.lucent.gk'
        type: string
      version_name:
        description: 'Version Name (e.g. 1.0.0)'
        required: true
        default: '1.0.0'
        type: string
      version_code:
        description: 'Version Code (integer)'
        required: true
        default: '1'
        type: string
      build_type:
        description: 'Build APK or AAB?'
        required: true
        default: 'apk'
        type: choice
        options:
          - apk
          - aab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (contains gk.html + icon.png)
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────────────────────
      # 1. Setup tools
      # ─────────────────────────────────────────────────────────────
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Pillow (for icon resizing)
        run: pip install pillow

      # ─────────────────────────────────────────────────────────────
      # 2. Prepare Android icon set from your 512×512 icon.png
      # ─────────────────────────────────────────────────────────────
      - name: Generate Android mipmap icons
        run: |
          python3 - <<EOF
          from PIL import Image
          import os

          os.makedirs("res", exist_ok=True)
          icon = Image.open("icon.png")

          sizes = {
              "mipmap-ldpi": 36,
              "mipmap-mdpi": 48,
              "mipmap-hdpi": 72,
              "mipmap-xhdpi": 96,
              "mipmap-xxhdpi": 144,
              "mipmap-xxxhdpi": 192
          }

          for folder, size in sizes.items():
              os.makedirs(f"res/{folder}", exist_ok=True)
              resized = icon.resize((size, size), Image.LANCZOS)
              resized.save(f"res/{folder}/ic_launcher.png")
              resized.save(f"res/{folder}/ic_launcher_round.png")
          print("✅ Icons generated for all densities")
          EOF

      # ─────────────────────────────────────────────────────────────
      # 3. Clone a clean WebView template (full WebSpeech + file upload support)
      # ─────────────────────────────────────────────────────────────
      - name: Clone WebView template
        run: git clone --depth 1 https://github.com/ayushsharma82/WebViewApp.git android-app

      # ─────────────────────────────────────────────────────────────
      # 4. Copy your gk.html as index.html into assets
      # ─────────────────────────────────────────────────────────────
      - name: Copy gk.html → assets/index.html
        run: |
          mkdir -p android-app/app/src/main/assets
          cp gk.html android-app/app/src/main/assets/index.html

      # ─────────────────────────────────────────────────────────────
      # 5. Copy generated icons
      # ─────────────────────────────────────────────────────────────
      - name: Copy icons to template
        run: |
          cp -r res/* android-app/app/src/main/res/

      # ─────────────────────────────────────────────────────────────
      # 6. Patch template with user inputs (package name, app name, version, local HTML)
      # ─────────────────────────────────────────────────────────────
      - name: Configure package name, app name, version & local HTML
        run: |
          cd android-app

          # 6.1 Update applicationId & version in build.gradle
          sed -i 's/applicationId "com\.example\.webview"/applicationId "${{ github.event.inputs.package_name }}"/g' app/build.gradle
          sed -i 's/versionName "1.0"/versionName "${{ github.event.inputs.version_name }}"/g' app/build.gradle
          sed -i 's/versionCode 1/versionCode ${{ github.event.inputs.version_code }}/g' app/build.gradle

          # 6.2 Update package in AndroidManifest.xml
          sed -i 's/package="com\.example\.webview"/package="${{ github.event.inputs.package_name }}"/g' app/src/main/AndroidManifest.xml

          # 6.3 Update app name in strings.xml
          sed -i 's/WebView App/${{ github.event.inputs.app_name }}/g' app/src/main/res/values/strings.xml

          # 6.4 Change Java package declaration + move files to new package path
          OLD_PKG="com.example.webview"
          NEW_PKG="${{ github.event.inputs.package_name }}"
          NEW_PATH=$(echo "$NEW_PKG" | tr '.' '/')

          mkdir -p "app/src/main/java/$NEW_PATH"
          mv app/src/main/java/com/example/webview/MainActivity.java "app/src/main/java/$NEW_PATH/MainActivity.java"

          # Update package line inside the Java file
          sed -i "s/package $OLD_PKG;/package $NEW_PKG;/g" "app/src/main/java/$NEW_PATH/MainActivity.java"

          # Update full class name in manifest
          sed -i "s/com\.example\.webview\.MainActivity/$NEW_PKG.MainActivity/g" app/src/main/AndroidManifest.xml

          # 6.5 Force load local index.html + enable all required WebView features
          sed -i 's|loadUrl(".*")|loadUrl("file:///android_asset/index.html")|g' "app/src/main/java/$NEW_PATH/MainActivity.java"

          # Ensure JS, file access, DOM storage, TTS, downloads are enabled (patch if missing)
          python3 - <<'PYEOF'
          import os
          path = "app/src/main/java/${{ github.event.inputs.package_name.replace('.', '/') }}/MainActivity.java"
          with open(path, "r", encoding="utf-8") as f:
              content = f.read()

          # Add missing imports and WebChromeClient for file upload + DownloadListener
          if "WebChromeClient" not in content:
              insert = """
          import android.webkit.WebChromeClient;
          import android.webkit.WebViewClient;
          import android.webkit.DownloadListener;
          import android.app.DownloadManager;
          import android.net.Uri;
          import android.os.Environment;
          import android.webkit.URLUtil;
          """
              content = content.replace("import android.webkit.WebView;", "import android.webkit.WebView;\n" + insert)

          # Enable settings
          if "setJavaScriptEnabled" not in content:
              content = content.replace(
                  "webView = findViewById(R.id.webView);",
                  """webView = findViewById(R.id.webView);
          webView.getSettings().setJavaScriptEnabled(true);
          webView.getSettings().setDomStorageEnabled(true);
          webView.getSettings().setAllowFileAccess(true);
          webView.getSettings().setAllowContentAccess(true);
          webView.getSettings().setMediaPlaybackRequiresUserGesture(false);
          webView.setWebViewClient(new WebViewClient());
          webView.setWebChromeClient(new WebChromeClient() {
              // File upload support
              private ValueCallback<Uri[]> filePathCallback;
              @Override
              public boolean onShowFileChooser(WebView webView, ValueCallback<Uri[]> filePathCallback, FileChooserParams fileChooserParams) {
                  this.filePathCallback = filePathCallback;
                  // You can launch Intent for file picker here if needed
                  return true;
              }
          });
          webView.setDownloadListener(new DownloadListener() {
              @Override
              public void onDownloadStart(String url, String userAgent, String contentDisposition, String mimetype, long contentLength) {
                  DownloadManager.Request request = new DownloadManager.Request(Uri.parse(url));
                  request.setMimeType(mimetype);
                  String cookies = android.webkit.CookieManager.getInstance().getCookie(url);
                  request.addRequestHeader("cookie", cookies);
                  request.setDescription("Downloading file...");
                  request.setTitle(URLUtil.guessFileName(url, contentDisposition, mimetype));
                  request.allowScanningByMediaScanner();
                  request.setNotificationVisibility(DownloadManager.Request.VISIBILITY_VISIBLE_NOTIFY_COMPLETED);
                  request.setDestinationInExternalPublicDir(Environment.DIRECTORY_DOWNLOADS, URLUtil.guessFileName(url, contentDisposition, mimetype));
                  DownloadManager dm = (DownloadManager) getSystemService(DOWNLOAD_SERVICE);
                  dm.enqueue(request);
              }
          });
          """
              )

          with open(path, "w", encoding="utf-8") as f:
              f.write(content)
          print("✅ MainActivity patched for WebSpeech, file upload & downloads")
          PYEOF

      # ─────────────────────────────────────────────────────────────
      # 7. Build
      # ─────────────────────────────────────────────────────────────
      - name: Build ${{ github.event.inputs.build_type }}
        run: |
          cd android-app
          if [ "${{ github.event.inputs.build_type }}" = "apk" ]; then
            ./gradlew assembleRelease
          else
            ./gradlew bundleRelease
          fi

      # ─────────────────────────────────────────────────────────────
      # 8. Sign the APK/AAB (using your keystore secrets)
      # ─────────────────────────────────────────────────────────────
      - name: Sign release
        uses: r0adkll/sign-android-release@v1.0.4
        with:
          releaseDirectory: android-app/app/build/outputs/${{ github.event.inputs.build_type == 'apk' && 'apk' || 'bundle' }}/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
          outputFileName: '${{ github.event.inputs.app_name }}.apk'   # works for both APK & AAB

      # ─────────────────────────────────────────────────────────────
      # 9. Upload signed artifact
      # ─────────────────────────────────────────────────────────────
      - name: Upload signed ${{ github.event.inputs.build_type }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-${{ github.event.inputs.version_name }}-signed
          path: android-app/app/build/outputs/${{ github.event.inputs.build_type == 'apk' && 'apk' || 'bundle' }}/release/${{ github.event.inputs.app_name }}.apk
          if-no-files-found: error

      - name: Success message
        run: echo "✅ Signed ${{ github.event.inputs.build_type }} ready! Download from Artifacts."