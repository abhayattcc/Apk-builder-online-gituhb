# ══════════════════════════════════════════════════════════════════════════════
#  PDF OCR Extractor  –  GitHub Actions Workflow
#  ─────────────────────────────────────────────
#  Repo layout (everything flat in root):
#
#    your-repo/
#    ├── ocr_extractor.py
#    ├── requirements.txt
#    ├── <credentials>.json        ← your GCP service-account JSON key (in root)
#    ├── scan.pdf                  ← upload your PDF here
#    ├── scan_ocr.txt              ← auto-generated
#    ├── scan_ocr.json             ← auto-generated
#    └── .github/workflows/
#        └── ocr_workflow.yml
#
#  No GitHub Secret needed — the workflow auto-detects any *.json in the root
#  (skipping package*.json) and uses it as the GCP service-account key.
# ══════════════════════════════════════════════════════════════════════════════

name: PDF OCR Extractor

on:
  push:
    paths:
      - "*.pdf"
  workflow_dispatch:
    inputs:
      pdf_filename:
        description: "PDF filename in repo root (e.g. scan.pdf)"
        required: false
        default: ""
      dpi:
        description: "Render DPI (default: 300)"
        required: false
        default: "300"

concurrency:
  group: ocr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ocr:
    name: Extract text from PDF(s)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Python (no cache — avoids setup failure) ────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Install dependencies from requirements.txt ─────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. GCP credentials ─────────────────────────────────────────────────
      - name: Configure Google Cloud credentials
        run: |
          CRED_FILE=$(find . -maxdepth 1 -name "*.json" \
                      ! -name "package*.json" \
                      | head -1)
          if [ -z "$CRED_FILE" ]; then
            echo "❌ No credentials JSON found in repo root." && exit 1
          fi
          ABS=$(realpath "$CRED_FILE")
          echo "GOOGLE_APPLICATION_CREDENTIALS=$ABS" >> "$GITHUB_ENV"
          echo "✅ Using credentials: $CRED_FILE"

      # ── 5. Find which PDF(s) to process ───────────────────────────────────
      - name: Detect PDF files
        id: detect
        run: |
          if [ -n "${{ github.event.inputs.pdf_filename }}" ]; then
            echo "pdfs=${{ github.event.inputs.pdf_filename }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "push" ]; then
            CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null \
                      || git ls-files "*.pdf")
            PDFS=$(echo "$CHANGED" | grep -E '^[^/]+\.pdf$' | tr '\n' ' ' | xargs)
            echo "pdfs=$PDFS" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          ALL=$(find . -maxdepth 1 -name "*.pdf" | sed 's|^\./||' | tr '\n' ' ' | xargs)
          echo "pdfs=$ALL" >> "$GITHUB_OUTPUT"

      # ── 6. Run OCR ─────────────────────────────────────────────────────────
      - name: Run OCR extraction
        env:
          PDF_LIST:   ${{ steps.detect.outputs.pdfs }}
          RENDER_DPI: ${{ github.event.inputs.dpi || '300' }}
        run: |
          if [ -z "$PDF_LIST" ]; then
            echo "⚠  No PDF files detected — nothing to process."
            exit 0
          fi

          echo "PDFs    : $PDF_LIST"
          echo "DPI     : $RENDER_DPI"

          for PDF in $PDF_LIST; do
            if [ ! -f "$PDF" ]; then
              echo "⚠  '$PDF' not found — skipping"
              continue
            fi
            STEM=$(basename "$PDF" .pdf)
            OUTPUT="${STEM}_ocr.txt"
            echo "▶  Processing: $PDF  →  $OUTPUT"
            python ocr_extractor.py "$PDF" --dpi "$RENDER_DPI" --output "$OUTPUT"
            echo "✓  Done"
          done

      # ── 7. Upload as artifact ──────────────────────────────────────────────
      - name: Upload OCR results as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ocr-results
          path: |
            *_ocr.txt
            *_ocr.json
          retention-days: 30
          if-no-files-found: warn

      # ── 8. Commit results back to repo ────────────────────────────────────
      - name: Commit OCR results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *_ocr.txt *_ocr.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "ℹ  Nothing new to commit."
          else
            git commit -m "🤖 OCR: extracted text [skip ci]"
            git push
            echo "✅ Results committed."
          fi
