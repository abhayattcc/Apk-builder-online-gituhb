name: Convert Legacy Odia PDF to Unicode

# Triggers whenever a new PDF is added directly to the main repository page
on:
  push:
    paths:
      - '*.pdf'
  workflow_dispatch: 

# Grants the Action permission to save the new text file back to your repo
permissions:
  contents: write

jobs:
  convert-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyMuPDF

      - name: Run Converter
        run: |
          # We create a quick Python wrapper to process every PDF in the root directory
          cat << 'EOF' > run_all.py
          import os
          import glob
          
          try:
              from odia_converter import process_pdf
          except ImportError:
              print("Error: odia_converter.py not found on the main page!")
              exit(1)
          
          # Find all PDFs on the main page
          for pdf_file in glob.glob('*.pdf'):
              txt_name = pdf_file.replace('.pdf', '.txt')
              print(f"Processing {pdf_file} -> {txt_name}")
              process_pdf(pdf_file, txt_name)
          EOF
          python run_all.py

      - name: Commit and Push Converted Files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add *.txt
          
          # Commit the file back to the repository if changes exist
          git diff --staged --quiet || git commit -m "Auto-converted PDF to Unicode TXT"
          git push
